packages:
  "framer-motion": "For page transitions and scroll-triggered animations to make the UI feel premium"
  "react-hook-form": "For robust form state management in Contact, Quote, and Portal pages"
  "clsx": "For conditional class merging in UI components"
  "tailwind-merge": "For resolving Tailwind class conflicts in UI components"
  "lucide-react": "For crisp, consistent iconography across the app"
  "date-fns": "For formatting dates in the client portal"

