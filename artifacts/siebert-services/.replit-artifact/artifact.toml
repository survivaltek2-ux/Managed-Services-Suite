kind = "web"
previewPath = "/"
title = "Siebert Services"
version = "1.0.0"
id = "artifacts/siebert-services"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19347
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/siebert-services run dev"

[services.env]
PORT = "19347"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/siebert-services", "run", "build"]
publicDir = "artifacts/siebert-services/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
