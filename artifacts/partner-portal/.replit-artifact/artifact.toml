kind = "web"
previewPath = "/partners/"
title = "Siebert Services Partner Portal"
version = "1.0.0"
id = "artifacts/partner-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25041
name = "web"
paths = ["/partners/"]

[services.development]
run = "pnpm --filter @workspace/partner-portal run dev"

[services.env]
PORT = "25041"
BASE_PATH = "/partners/"

[services.production]
build = ["pnpm", "--filter", "@workspace/partner-portal", "run", "build"]
publicDir = "artifacts/partner-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
